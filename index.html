<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculater XD </h1>
    <label for="numA">พิมพ์ตัวเลข</label>
    <input type="number" id="numA"><br><br>
    <label for="operator">พิมพ์เครื่องหมาย</label>
    <input type="text" id="operator" maxlength="1"><br><br>
    <label for="numB">พิมพ์ตัวเลขอีกตัว</label>
    <input type="number" id="numB"><br><br>

    <button onclick="Backend()">Calculate</button>

    <p id="output">*กรอกข้อมูลให้ครบแล้วกดปุ่มCalculate(กรอกไม่ครบเป็นเก)</p>
    
    <script>
       function Backend() {
            const A = document.getElementById('numA').value;
            const B = document.getElementById('numB').value;
            const ope = document.getElementById('operator').value.trim(); 
            const outputDiv = document.getElementById('output');

            if (A === "" || B === "" || ope === "") {
                outputDiv.innerText = "กรอกไม่ครบเป็นเกนะ";
                return;
            }
             fetch(`http://localhost:3000/?A=${A}&B=${B}&ope=${encodeURIComponent(ope)}`)
                .then(res => res.json())
                .then(data => {
                    outputDiv.innerText = data.result;
                });
        }

        
    </script>
</body>
</html>
